name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          cd "حصن/src"
          pod install || echo "Pod install done"

      - name: Build IPA (unsigned)
        run: |
          cd "حصن/src"
          xcodebuild \
            -workspace "حصن.xcworkspace" \
            -scheme "حصن" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ../../build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            VALIDATE_WORKSPACE=NO \
            build 2>&1 | grep -E "(error:|warning:|BUILD|Ld )" | tail -50

      - name: Check build output
        run: |
          find build/Build/Products/Release-iphoneos -name "*.app" 2>/dev/null || echo "No .app found"

      - name: Package IPA
        run: |
          APP_PATH=$(find build/Build/Products/Release-iphoneos -name "*.app" -maxdepth 1 | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app file found!"
            exit 1
          fi
          echo "Found app: $APP_PATH"
          mkdir -p output
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r "output/حصن.ipa" Payload
          echo "IPA created successfully!"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: حصن-ipa
          path: output/حصن.ipa
          retention-days: 7
